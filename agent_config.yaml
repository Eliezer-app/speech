# Agent integration (optional — omit endpoints to disable)

# Static initial prompt for whisper STT (always prepended)
# Agent context from stt_context_url is appended after this
stt_initial_prompt: ""

# GET: called on hotword detection, returns plain text context
# used as initial_prompt for whisper STT
stt_context_url: http://127.0.0.1:3100/stt-prompt

# POST: called after silence timeout with accumulated transcript
chat_message_url: http://127.0.0.1:3100/user/send
